# =============================================================================
# CodeScan Nginx Configuration
# =============================================================================
# Reverse proxy for the Flask/Gunicorn backend on EC2.
#
# Architecture:
#   CloudFront (HTTPS) -> EC2 (port 80, HTTP) -> Nginx -> Gunicorn (5000)
#
# CloudFront terminates SSL, so EC2 only needs HTTP. This is secure because
# the viewer-facing connection is encrypted by CloudFront.
#
# Install:
#   sudo cp codescan.conf /etc/nginx/sites-available/codescan
#   sudo ln -s /etc/nginx/sites-available/codescan /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx
# =============================================================================

# Upstream Gunicorn workers
upstream codescan_backend {
    server 127.0.0.1:5000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    # Security: pass real client IP and protocol to Flask
    # (so Flask-Login rate limiting uses the real IP, not 127.0.0.1)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy ALL requests to Gunicorn (Flask handles /api/* and /health)
    location / {
        proxy_pass http://codescan_backend;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Health check endpoint — no buffering for fast responses
    location = /health {
        proxy_pass http://codescan_backend;
        access_log off;
    }
}
